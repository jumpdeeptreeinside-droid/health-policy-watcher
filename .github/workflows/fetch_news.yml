name: 医療政策ニュース自動収集

on:
  # 毎日 日本時間 7:00 / 10:00 / 13:00 / 16:00 / 19:00 / 22:00 に実行（6回）
  # UTC = JST - 9
  schedule:
    - cron: '0 22 * * *'   # JST 7:00
    - cron: '0 1 * * *'    # JST 10:00
    - cron: '0 4 * * *'    # JST 13:00
    - cron: '0 7 * * *'    # JST 16:00
    - cron: '0 10 * * *'   # JST 19:00
    - cron: '0 13 * * *'   # JST 22:00
  
  # 手動実行も可能
  workflow_dispatch:

concurrency:
  group: fetch-news
  cancel-in-progress: false

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
      
      - name: Python環境をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 依存関係をインストール
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: ニュースを収集してNotionに追加
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cd src
          python fetch_news_to_notion.py
      
      - name: ログをアップロード（エラー時）
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: fetch_news.log
          retention-days: 7

      - name: 失敗通知メールを送信
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.GMAIL_ADDRESS }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "【エラー】ニュース自動収集 失敗 - 要確認"
          to: jump.deep.tree.inside@gmail.com
          from: ${{ secrets.GMAIL_ADDRESS }}
          body: |
            ニュース自動収集に失敗しました。

            ログを確認してください:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
