# 海外ヘッドラインまとめ（2026-07-07 オペ改訂）: 国際系の音声を1日1本に束ねる
name: 海外ヘッドラインまとめ生成

on:
  schedule:
    - cron: '5 10 * * *'   # JST 19:05（日次の国際ニュースを夕方に束ねる）
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests Markdown google-generativeai
      - name: まとめ生成
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
        run: python src/daily_digest_generator.py
