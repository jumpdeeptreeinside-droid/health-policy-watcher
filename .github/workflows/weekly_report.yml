name: 週次レポート自動生成 (Weekly Report)

on:
  # 毎週土曜日 6:00 JST (UTC 金曜 21:00) に実行
  schedule:
    - cron: '0 21 * * 5'

  # GitHub Actions 画面から手動実行も可能
  workflow_dispatch:

permissions:
  contents: write   # スライドファイルと weekly_vol.txt をコミット・プッシュするために必要

jobs:
  generate-weekly-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. リポジトリをチェックアウト ──────────────────────
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python 環境のセットアップ ───────────────────────
      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. 依存パッケージのインストール ────────────────────
      - name: 依存パッケージをインストール
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. 週次レポート生成スクリプトを実行 ────────────────
      - name: 週次レポートを生成
        env:
          NOTION_API_KEY:     ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          # モデルを変更したい場合は GitHub Secret に設定（未設定時: gemini-2.0-flash）
          GEMINI_MODEL:       ${{ secrets.GEMINI_MODEL }}
          WEEKLY_REPORT_PARENT_PAGE_ID: ${{ secrets.WEEKLY_REPORT_PARENT_PAGE_ID }}
          # Gmail 設定（完了メール送信用）
          GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python src/weekly_report_generator.py

      # ── 5. スライドファイルと Vol番号をコミット・プッシュ ──
      - name: スライドと Vol番号をコミット
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "GitHub Actions"
          git add output/slides/ config/weekly_vol.txt
          git diff --staged --quiet || git commit -m "feat: Vol.${{ env.WEEKLY_VOL_NUMBER }} 週次レポート自動生成 (${{ env.WEEKLY_ISSUE_DATE }})"
          git push

      # ── 6. 失敗時の通知メール ──────────────────────────────
      - name: 失敗通知メールを送信
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.GMAIL_ADDRESS }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "【週次レポート】GitHub Actions 実行失敗 - 要確認"
          to: jump.deep.tree.inside@gmail.com
          from: ${{ secrets.GMAIL_ADDRESS }}
          body: |
            週次レポートの自動生成に失敗しました。

            GitHub Actions のログを確認してください:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            よくある原因:
            - WeeklyReport? = "Yes" の記事が 0 件
            - Notion API や Gemini API のエラー
            - スクレイピング失敗（対象サイトがブロック）
